<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Euchre">
<meta name="theme-color" content="#17472a">
<title>Euchre</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root {
    /* 13vh cap keeps cards small enough for landscape; no effect in portrait */
    --cw: min(16.5vw, 84px, 13vh);
    --ch: calc(var(--cw) * 1.85);
    --gold: #f5c542;
  }
  /* html gets the base color so no white ever shows past the body
     (iPhone home-indicator area, overscroll, standalone mode) */
  html { background: #17472a; }
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; overscroll-behavior: none; }
  body {
    background: radial-gradient(ellipse at 50% 35%, #35854d 0%, #236038 55%, #17472a 100%);
    background-color: #17472a;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: #fff; user-select: none; -webkit-user-select: none; touch-action: manipulation;
    position: fixed; inset: 0;
  }
  #app {
    display: flex; flex-direction: column; height: 100dvh;
    padding-left: env(safe-area-inset-left, 0px); padding-right: env(safe-area-inset-right, 0px);
  }
  @media (orientation: landscape) {
    #topbar { padding-top: calc(env(safe-area-inset-top, 0px) + 3px); padding-bottom: 2px; }
    .scorebox { padding: 2px 8px; }
    .scorebox .pts { font-size: 16px; }
    #actions { min-height: 38px; }
    .abtn { padding: 7px 14px; font-size: 14px; }
    #hand { padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 4px); }
    #msg { top: 8%; }
    .overlay h1 { font-size: 32px; }
    .overlay { gap: 9px; }
  }

  /* ---- top bar ---- */
  #topbar {
    display: flex; align-items: stretch; gap: 6px;
    padding: calc(env(safe-area-inset-top, 0px) + 6px) 8px 4px;
  }
  .scorebox {
    flex: 1; background: rgba(0,0,0,.28); border-radius: 10px; padding: 4px 8px;
    display: flex; flex-direction: column; line-height: 1.15; min-width: 0;
  }
  .scorebox { overflow: hidden; }
  .scorebox .lbl { display: block; font-size: 10px; letter-spacing: .5px; opacity: .75; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .scorebox .row { display: flex; align-items: baseline; gap: 6px; }
  .scorebox .pts { font-size: 21px; font-weight: 700; }
  .scorebox .pips { font-size: 9px; letter-spacing: 2px; color: var(--gold); }
  .scorebox.lead { outline: 1.5px solid rgba(245,197,66,.6); }
  #mid { display: flex; flex-direction: column; align-items: center; justify-content: center; min-width: 88px; gap: 2px; }
  #trumpBadge { font-size: 13px; font-weight: 700; background: rgba(0,0,0,.28); padding: 3px 10px; border-radius: 999px; white-space: nowrap; }
  #trumpBadge .red { color: #ff6b6b; }
  #trumpBadge:empty { display: none; }
  #aloneBadge { font-size: 9px; font-weight: 800; letter-spacing: 1px; color: #111;
    background: var(--gold); padding: 1px 8px; border-radius: 999px; display: none; }
  #menuBtn, #sndBtn {
    background: rgba(0,0,0,.28); border: 0; color: #fff; border-radius: 10px;
    font-size: 15px; width: 36px; flex: 0 0 auto;
  }

  /* ---- table ---- */
  #table { flex: 1; position: relative; min-height: 0; }
  .seat { position: absolute; display: flex; flex-direction: column; align-items: center; gap: 3px; }
  #seat2 { top: 4px; left: 50%; transform: translateX(-50%); }
  #seat1 { left: 6px; top: 50%; transform: translateY(-50%); }
  #seat3 { right: 6px; top: 50%; transform: translateY(-50%); }
  .backs { display: flex; }
  #seat1 .backs, #seat3 .backs { flex-direction: column; }
  .mini {
    width: calc(var(--cw) * .48); height: calc(var(--cw) * .48 * 1.85);
    background-size: cover; border-radius: 5px; box-shadow: 0 1px 3px rgba(0,0,0,.4);
    border: 1px solid rgba(255,255,255,.55);
  }
  #seat2 .mini + .mini { margin-left: calc(var(--cw) * -.30); }
  #seat1 .mini + .mini, #seat3 .mini + .mini { margin-top: calc(var(--cw) * -.62); }
  .pname {
    font-size: 11px; font-weight: 600; background: rgba(0,0,0,.32);
    padding: 2px 9px; border-radius: 999px; display: flex; gap: 5px; align-items: center; white-space: nowrap;
  }
  .pname .chip { background: var(--gold); color: #222; font-weight: 800; font-size: 9px;
    border-radius: 50%; width: 13px; height: 13px; display: none; align-items: center; justify-content: center; }
  .pname.dealer .chip { display: flex; }
  .pname.turn { box-shadow: 0 0 0 1.5px var(--gold); }
  .seat.out { opacity: .35; }

  /* ---- center: kitty + trick ---- */
  #trumpCenter {
    position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
    font-size: clamp(70px, 24vw, 130px); line-height: 1; pointer-events: none;
    color: rgba(0, 0, 0, .30); text-shadow: 0 2px 12px rgba(0,0,0,.15);
    display: flex; flex-direction: column; align-items: center; gap: 0;
  }
  #trumpCenter.red { color: rgba(200, 30, 30, .38); }
  #trumpCenter .tcl { font-size: 13px; font-weight: 800; letter-spacing: 3px; opacity: .9; }
  #center { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); }
  #kitty { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); display: none; }
  #kitty .kcard {
    position: absolute; left: 0; top: 0; width: calc(var(--cw) * .9); height: calc(var(--cw) * .9 * 1.85);
    border-radius: 7px; background-size: cover; box-shadow: 0 2px 6px rgba(0,0,0,.45);
    border: 1px solid rgba(255,255,255,.6);
  }
  #kitty .up { transform: rotate(6deg) translate(calc(var(--cw) * .28), 0); transition: opacity .3s; }
  #kitty .up.down { filter: brightness(.55) saturate(.6); }
  #kitty { width: calc(var(--cw) * .9); height: calc(var(--cw) * .9 * 1.85); margin-left: calc(var(--cw) * -.2); }
  .slot { position: absolute; left: 0; top: 0; width: calc(var(--cw) * .95); height: calc(var(--cw) * .95 * 1.85); margin: calc(var(--cw) * .95 * -.87) 0 0 calc(var(--cw) * -.475); }
  #slot0 { transform: translateY(calc(var(--cw) * .58)) rotate(-2deg); }
  #slot1 { transform: translateX(calc(var(--cw) * -.72)) rotate(-9deg); }
  #slot2 { transform: translateY(calc(var(--cw) * -.58)) rotate(4deg); }
  #slot3 { transform: translateX(calc(var(--cw) * .72)) rotate(8deg); }
  .slot img {
    width: 100%; border-radius: 7px; box-shadow: 0 3px 8px rgba(0,0,0,.45);
    border: 1px solid rgba(255,255,255,.6); display: block;
  }
  .slot .in0 { animation: fly0 .3s ease-out; } .slot .in1 { animation: fly1 .3s ease-out; }
  .slot .in2 { animation: fly2 .3s ease-out; } .slot .in3 { animation: fly3 .3s ease-out; }
  @keyframes fly0 { from { transform: translateY(45vh); opacity: .4; } }
  @keyframes fly1 { from { transform: translateX(-45vw); opacity: .4; } }
  @keyframes fly2 { from { transform: translateY(-45vh); opacity: .4; } }
  @keyframes fly3 { from { transform: translateX(45vw); opacity: .4; } }
  #trick.collect0 .slot img { transition: transform .45s ease-in, opacity .45s; transform: translateY(38vh); opacity: 0; }
  #trick.collect1 .slot img { transition: transform .45s ease-in, opacity .45s; transform: translateX(-38vw); opacity: 0; }
  #trick.collect2 .slot img { transition: transform .45s ease-in, opacity .45s; transform: translateY(-38vh); opacity: 0; }
  #trick.collect3 .slot img { transition: transform .45s ease-in, opacity .45s; transform: translateX(38vw); opacity: 0; }

  /* ---- message ---- */
  #msg {
    position: absolute; left: 50%; top: 14%; transform: translateX(-50%);
    background: rgba(0,0,0,.55); border-radius: 999px; padding: 6px 16px;
    font-size: 14px; font-weight: 600; white-space: nowrap; opacity: 0;
    transition: opacity .25s; pointer-events: none; max-width: 92vw; overflow: hidden; text-overflow: ellipsis;
    z-index: 5;
  }
  #msg.show { opacity: 1; }
  #msg.big {
    font-size: 18px; padding: 11px 22px; border: 1.5px solid var(--gold);
    background: rgba(0,0,0,.78); top: 20%;
  }
  #msg .red { color: #ff6b6b; }
  .pname.won { box-shadow: 0 0 0 2px var(--gold), 0 0 14px rgba(245,197,66,.8); }

  /* ---- actions ---- */
  #actions {
    display: flex; justify-content: center; align-items: center; gap: 8px;
    min-height: 46px; padding: 2px 8px; flex-wrap: wrap;
    position: relative; z-index: 10; /* keep buttons above raised hand cards */
  }
  .abtn {
    border: 0; border-radius: 12px; padding: 10px 16px; font-size: 15px; font-weight: 700;
    background: #fff; color: #1b4d2a; box-shadow: 0 2px 5px rgba(0,0,0,.35);
  }
  .abtn:active { transform: translateY(1px); }
  .abtn.dim { background: rgba(255,255,255,.25); color: #fff; }
  .abtn.gold { background: var(--gold); color: #222; }
  .abtn.toggled { outline: 3px solid var(--gold); }
  .abtn .red { color: #d02020; }
  #hint { font-size: 12px; opacity: .85; width: 100%; text-align: center; }
  #hint:empty { display: none; }

  /* ---- hand ---- */
  #hand {
    display: flex; justify-content: center; align-items: flex-end;
    padding: 4px 6px calc(env(safe-area-inset-bottom, 0px) + 8px);
    height: calc(var(--ch) + env(safe-area-inset-bottom, 0px) + 16px);
    position: relative; z-index: 1;
  }
  .card { width: var(--cw); flex: 0 0 auto; transition: transform .15s, filter .2s; position: relative; }
  .card + .card { margin-left: calc(var(--cw) * -.42); }
  .card img {
    width: 100%; display: block; border-radius: 8px;
    box-shadow: -2px 2px 6px rgba(0,0,0,.4); border: 1px solid rgba(255,255,255,.6);
  }
  .card.off { filter: brightness(.5) saturate(.55); }
  .card.pick { transform: translateY(calc(var(--cw) * -.18)); }
  #hand.dimmed .card { filter: brightness(.6); }

  /* ---- overlays ---- */
  .overlay {
    position: fixed; inset: 0; background: rgba(10, 30, 18, .88); z-index: 20;
    display: none; flex-direction: column; align-items: center; justify-content: center;
    gap: 14px; text-align: center; padding: 24px;
  }
  .overlay.show { display: flex; }
  .overlay h1 { font-size: 44px; margin: 0; letter-spacing: 1px; text-shadow: 0 3px 10px rgba(0,0,0,.5); }
  .overlay h2 { font-size: 30px; margin: 0; }
  .overlay .sub { opacity: .8; font-size: 14px; margin-top: -6px; }
  .obtn {
    border: 0; border-radius: 14px; padding: 14px 34px; font-size: 18px; font-weight: 700;
    background: var(--gold); color: #222; box-shadow: 0 3px 8px rgba(0,0,0,.4); min-width: 220px;
  }
  .obtn.alt { background: rgba(255,255,255,.16); color: #fff; }
  #diffRow { display: flex; gap: 8px; }
  #sizeRow { display: flex; flex-direction: column; gap: 8px; }
  .obtn.locked { opacity: .38; pointer-events: none; }

  /* ---- multiplayer ---- */
  .mpin {
    border: 0; border-radius: 10px; padding: 10px 12px; font-size: 16px; text-align: center;
    background: rgba(255,255,255,.14); color: #fff; outline: none;
    user-select: text; -webkit-user-select: text; width: 230px;
  }
  .mpin::placeholder { color: rgba(255,255,255,.55); }
  .mpin:focus { background: rgba(255,255,255,.25); }
  #mpJoinRow { display: flex; gap: 8px; align-items: center; }
  #mpJoinRow .mpin { width: 112px; letter-spacing: 4px; text-transform: uppercase; }
  #mpJoinRow .obtn { min-width: 0; padding: 10px 24px; }
  .codechip { background: var(--gold); color: #222; border-radius: 10px; padding: 2px 12px; letter-spacing: 3px; }
  #mpSeats { display: flex; flex-direction: column; gap: 7px; width: min(84vw, 340px); }
  .mpSeatRow { display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,.10); border-radius: 10px; padding: 9px 12px; }
  .mpSeatRow .sl { font-size: 11px; opacity: .7; width: 86px; text-align: left; }
  .mpSeatRow .sn { flex: 1; text-align: left; font-weight: 600; font-size: 14px; }
  .mpSeatRow .abtn { padding: 6px 14px; font-size: 13px; }
  #mpStartBtn:disabled { opacity: .4; }

  /* ---- trophy room ---- */
  #shelfWall {
    background: linear-gradient(#5a3a1e, #462c14);
    border-radius: 14px; padding: 26px 18px 0; box-shadow: inset 0 4px 18px rgba(0,0,0,.5);
    width: min(82vw, 400px); max-width: calc(100vw - 60px);
  }
  .shelfRow { display: flex; justify-content: center; align-items: flex-end; gap: min(5vw, 26px); min-height: 120px; }
  .plank {
    height: 13px; border-radius: 3px; margin: 0 -6px;
    background: linear-gradient(#a9713a, #7c4d22 60%, #5e3817);
    box-shadow: 0 5px 8px rgba(0,0,0,.45);
  }
  .tslot { display: flex; flex-direction: column; align-items: center; gap: 3px; position: relative; }
  .tslot svg { width: min(19vw, 84px); height: auto; filter: drop-shadow(0 3px 4px rgba(0,0,0,.5)); }
  .tslot.unearned svg { filter: brightness(.22) saturate(0); opacity: .8; }
  .tslot .tname { font-size: 11px; font-weight: 700; letter-spacing: .5px; margin-bottom: 6px; }
  .tslot.unearned .tname { opacity: .45; }
  .tslot .tcount {
    position: absolute; top: -4px; right: -10px; background: var(--gold); color: #222;
    font-size: 11px; font-weight: 800; border-radius: 999px; padding: 1px 7px;
  }
  #tourArt svg { width: 110px; height: auto; filter: drop-shadow(0 4px 8px rgba(0,0,0,.5)); }
  #nameRow { display: flex; flex-direction: column; gap: 7px; width: 230px; }
  #nameRow input {
    border: 0; border-radius: 10px; padding: 9px 12px; font-size: 16px; text-align: center;
    background: rgba(255,255,255,.14); color: #fff; outline: none;
    user-select: text; -webkit-user-select: text;
  }
  #nameRow input::placeholder { color: rgba(255,255,255,.55); }
  #nameRow input:focus { background: rgba(255,255,255,.25); }
  .dbtn {
    border: 0; border-radius: 12px; padding: 10px 18px; font-size: 15px; font-weight: 600;
    background: rgba(255,255,255,.14); color: #fff;
  }
  .dbtn.sel { background: #fff; color: #1b4d2a; }
  #menuCards { display: flex; margin-bottom: 4px; }
  #menuCards img { width: 74px; border-radius: 7px; box-shadow: 0 4px 10px rgba(0,0,0,.5); border: 1px solid rgba(255,255,255,.7); }
  #menuCards img:nth-child(1) { transform: rotate(-12deg) translateX(10px); }
  #menuCards img:nth-child(2) { transform: rotate(0deg) translateY(-8px); z-index: 1; }
  #menuCards img:nth-child(3) { transform: rotate(12deg) translateX(-10px); }
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <div class="scorebox" id="box0">
      <span class="lbl" id="lbl0">MY TEAM</span>
      <span class="row"><span class="pts" id="pts0">0</span><span class="pips" id="pips0"></span></span>
    </div>
    <div id="mid">
      <span id="trumpBadge"></span>
      <span id="aloneBadge">ALONE</span>
    </div>
    <div class="scorebox" id="box1">
      <span class="lbl" id="lbl1">OPPONENTS</span>
      <span class="row"><span class="pts" id="pts1">0</span><span class="pips" id="pips1"></span></span>
    </div>
    <button id="sndBtn">🔊</button>
    <button id="menuBtn">☰</button>
  </div>

  <div id="table">
    <div class="seat" id="seat2"><div class="pname" id="name2"><span class="chip">D</span><span id="nmtxt2">North</span></div><div class="backs" id="backs2"></div></div>
    <div class="seat" id="seat1"><div class="pname" id="name1"><span class="chip">D</span><span id="nmtxt1">West</span></div><div class="backs" id="backs1"></div></div>
    <div class="seat" id="seat3"><div class="pname" id="name3"><span class="chip">D</span><span id="nmtxt3">East</span></div><div class="backs" id="backs3"></div></div>
    <div id="trumpCenter"></div>
    <div id="center">
      <div id="kitty"></div>
      <div id="trick">
        <div class="slot" id="slot0"></div><div class="slot" id="slot1"></div>
        <div class="slot" id="slot2"></div><div class="slot" id="slot3"></div>
      </div>
    </div>
    <div id="msg"></div>
  </div>

  <div id="actions"><span id="hint"></span></div>
  <div id="hand"></div>
</div>

<div class="overlay" id="menu">
  <div id="menuCards"></div>
  <h1>EUCHRE</h1>
  <div class="sub">First to 10 &middot; Stick the Dealer</div>
  <div id="diffRow">
    <button class="dbtn" data-d="easy">Easy</button>
    <button class="dbtn sel" data-d="normal">Normal</button>
    <button class="dbtn" data-d="hard">Hard</button>
  </div>
  <div id="nameRow">
    <input id="nm2" placeholder="Partner name (North)" maxlength="12" autocomplete="off">
    <input id="nm1" placeholder="Left opponent (West)" maxlength="12" autocomplete="off">
    <input id="nm3" placeholder="Right opponent (East)" maxlength="12" autocomplete="off">
  </div>
  <div class="sub" id="buildTag" style="opacity:.45;font-size:11px">build Jul 02, 01:03 AM</div>
  <button class="obtn" id="startBtn">New Game</button>
  <button class="obtn alt" id="tourStartBtn">Tournament</button>
  <button class="obtn alt" id="mpBtn">Play with Friends</button>
  <button class="obtn alt" id="trophyBtn">🔒 Trophy Room</button>
  <button class="obtn alt" id="contBtn" style="display:none">Continue Match</button>
</div>

<div class="overlay" id="trophyRoom">
  <h2>Trophy Room</h2>
  <div id="shelfWall">
    <div class="shelfRow" id="shelfSlots"></div>
    <div class="plank"></div>
  </div>
  <div class="sub" id="shelfHint"></div>
  <button class="obtn alt" id="trophyBack">Back</button>
</div>

<div class="overlay" id="mpSetup">
  <h2>Play with Friends</h2>
  <input id="mpName" class="mpin" placeholder="Your name" maxlength="12" autocomplete="off">
  <button class="obtn" id="mpHostBtn">Host a Table</button>
  <div id="mpJoinRow">
    <input id="mpCode" class="mpin" placeholder="CODE" maxlength="4" autocomplete="off" autocapitalize="characters">
    <button class="obtn" id="mpJoinBtn">Join</button>
  </div>
  <div class="sub" id="mpStatus"></div>
  <button class="obtn alt" id="mpBack">Back</button>
</div>

<div class="overlay" id="mpLobby">
  <h2>Table&nbsp;<span id="mpCodeShow" class="codechip"></span></h2>
  <div class="sub">Friends join with this code</div>
  <div id="mpSeats"></div>
  <button class="obtn" id="mpStartBtn" style="display:none">Start Game</button>
  <div class="sub" id="mpLobbyStatus"></div>
  <button class="obtn alt" id="mpLeaveBtn">Leave Table</button>
</div>

<div class="overlay" id="tourSetup">
  <h2>Tournament</h2>
  <div class="sub">Win every match to take the cup — it gets tougher every round</div>
  <div id="sizeRow">
    <button class="obtn" data-size="4">4 Teams</button>
    <button class="obtn" data-size="8">8 Teams</button>
    <button class="obtn" data-size="16">16 Teams</button>
  </div>
  <button class="obtn alt" id="tourBack">Back</button>
</div>

<div class="overlay" id="tourOv">
  <div id="tourArt"></div>
  <h1 id="tourTitle"></h1>
  <div class="sub" id="tourSub"></div>
  <button class="obtn" id="tourGo"></button>
  <button class="obtn alt" id="tourMenu">Menu</button>
</div>

<div class="overlay" id="gameover">
  <h1 id="goTitle"></h1>
  <div class="sub" id="goScore"></div>
  <button class="obtn" id="againBtn">Play Again</button>
  <button class="obtn alt" id="goMenuBtn">Menu</button>
</div>

<div class="overlay" id="confirm">
  <h2>Leave this match?</h2>
  <button class="obtn" id="confirmYes">Yes, back to menu</button>
  <button class="obtn alt" id="confirmNo">Keep Playing</button>

// ===== Euchre pure game logic (no DOM) =====
// Card codes: rank + suit, e.g. "9H", "TH" (ten), "JS", "AC".
// Players: 0 = You (South), 1 = West, 2 = North (partner), 3 = East.
// Teams: 0 = players 0 & 2 ("Us"), 1 = players 1 & 3 ("Them").

const SUITS = ['H', 'D', 'S', 'C'];
const RANKS = ['9', 'T', 'J', 'Q', 'K', 'A'];
const SAME_COLOR = { H: 'D', D: 'H', S: 'C', C: 'S' };
const SUIT_NAME = { H: 'Hearts', D: 'Diamonds', S: 'Spades', C: 'Clubs' };
const SUIT_SYM = { H: '♥', D: '♦', S: '♠', C: '♣' };
const RANK_VAL = { '9': 1, T: 2, J: 3, Q: 4, K: 5, A: 6 };

function makeDeck() {
  const d = [];
  for (const s of SUITS) for (const r of RANKS) d.push(r + s);
  return d;
}

function shuffle(deck, rng) {
  rng = rng || Math.random;
  const d = deck.slice();
  for (let i = d.length - 1; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    [d[i], d[j]] = [d[j], d[i]];
  }
  return d;
}

function team(p) { return p % 2; }
function partnerOf(p) { return (p + 2) % 4; }

// The suit a card counts as, given trump (left bower counts as trump).
function effSuit(c, trump) {
  return (c[0] === 'J' && c[1] === SAME_COLOR[trump]) ? trump : c[1];
}

// Power of a card within a trick. Higher wins. Cards that are neither trump
// nor the led suit get a sub-1 value (can never win) usable for cheapness ranking.
function cardPower(c, trump, led) {
  const r = c[0], s = c[1];
  if (r === 'J' && s === trump) return 100;            // right bower
  if (r === 'J' && s === SAME_COLOR[trump]) return 99; // left bower
  if (s === trump) return 80 + RANK_VAL[r];
  if (led && s === led) return 10 + RANK_VAL[r];
  return RANK_VAL[r] / 10;
}

// Value used to rank a card's worth in-hand (for dumping lowest, discards).
function intrinsicValue(c, trump) {
  return cardPower(c, trump, effSuit(c, trump));
}

function legalMoves(hand, led, trump) {
  if (!led) return hand.slice();
  const follow = hand.filter(c => effSuit(c, trump) === led);
  return follow.length ? follow : hand.slice();
}

// plays: [{p, c}] in play order. Returns index into plays of the winner.
function trickWinnerIdx(plays, trump) {
  const led = effSuit(plays[0].c, trump);
  let best = 0;
  for (let i = 1; i < plays.length; i++) {
    if (cardPower(plays[i].c, trump, led) > cardPower(plays[best].c, trump, led)) best = i;
  }
  return best;
}

// Hand scoring. makerTeam called trump; tricks = [teamO count, team1 count].
function scoreHand(makerTeam, tricks, alone) {
  const makerTricks = tricks[makerTeam];
  if (makerTricks >= 3) {
    if (makerTricks === 5) return { team: makerTeam, points: alone ? 4 : 2, label: alone ? 'Lone march!' : 'March!' };
    return { team: makerTeam, points: 1, label: 'Point' };
  }
  return { team: 1 - makerTeam, points: 2, label: 'Euchred!' };
}

// ---- Bidding heuristics ----

function handStrength(hand, trump) {
  let s = 0, trumps = 0;
  const offSuits = {};
  for (const c of hand) {
    const es = effSuit(c, trump);
    if (es === trump) {
      trumps++;
      if (c[0] === 'J') s += (c[1] === trump) ? 3 : 2.5;
      else s += { A: 2, K: 1.5, Q: 1.25, T: 1, '9': 0.9 }[c[0]];
    } else {
      offSuits[es] = (offSuits[es] || 0) + 1;
      if (c[0] === 'A') s += 1;
    }
  }
  if (trumps >= 2) {
    const voids = SUITS.filter(x => x !== trump && !offSuits[x]).length;
    s += voids * 0.5;
  }
  return s;
}

// Best 5-card keep from 6 cards (dealer after pickup). Returns {keep, discard}.
function bestKeep(hand6, trump) {
  let best = null;
  for (let i = 0; i < hand6.length; i++) {
    const keep = hand6.slice(0, i).concat(hand6.slice(i + 1));
    const s = handStrength(keep, trump);
    const dv = intrinsicValue(hand6[i], trump);
    if (!best || s > best.s + 1e-9 || (Math.abs(s - best.s) < 1e-9 && dv < best.dv)) {
      best = { s, dv, keep, discard: hand6[i] };
    }
  }
  return best;
}

const BID_THRESH = {
  easy:   { r1: 7.2, r2: 6.8, alone: 11.5 },
  normal: { r1: 5.9, r2: 5.6, alone: 9.2 },
  hard:   { r1: 5.5, r2: 5.2, alone: 8.6 },
  xhard:  { r1: 5.3, r2: 5.0, alone: 8.2 },
};

// Round 1 decision for player p. Returns {call, alone, strength}.
function decideBid1(hand, upcard, p, dealer, level, rng) {
  rng = rng || Math.random;
  const trump = upcard[1];
  const th = BID_THRESH[level];
  let s;
  if (p === dealer) s = bestKeep(hand.concat([upcard]), trump).s;
  else s = handStrength(hand, trump);
  if (p !== dealer) {
    if (partnerOf(p) === dealer) s += 0.8;      // partner gains the upcard
    else s -= 1.2;                              // an opponent gains the upcard
  }
  if (level === 'easy') s += (rng() - 0.5) * 2; // erratic
  const call = s >= th.r1;
  const alone = call && s >= th.alone;
  return { call, alone, strength: s };
}

// Round 2 decision. excluded = turned-down suit. mustCall = stick the dealer.
function decideBid2(hand, excluded, level, mustCall, rng) {
  rng = rng || Math.random;
  const th = BID_THRESH[level];
  let best = null;
  for (const t of SUITS) {
    if (t === excluded) continue;
    const s = handStrength(hand, t);
    if (!best || s > best.s) best = { suit: t, s };
  }
  let s = best.s;
  if (level === 'easy') s += (rng() - 0.5) * 2;
  if (s >= th.r2 || mustCall) {
    return { call: true, suit: best.suit, alone: best.s >= th.alone, strength: best.s };
  }
  return { call: false };
}

function chooseDiscard(hand6, trump, level) {
  if (level === 'easy') {
    return hand6.slice().sort((a, b) => intrinsicValue(a, trump) - intrinsicValue(b, trump))[0];
  }
  return bestKeep(hand6, trump).discard;
}

// ---- Card play AI ----

// True if no unseen card can beat `card` in the context it would be played.
function isBoss(card, trump, unseen) {
  const led = effSuit(card, trump);
  const myPow = cardPower(card, trump, led);
  for (const u of unseen) {
    if (cardPower(u, trump, led) > myPow) return false;
  }
  return true;
}

function lowestBy(cards, trump) {
  return cards.slice().sort((a, b) => intrinsicValue(a, trump) - intrinsicValue(b, trump))[0];
}
function highestBy(cards, trump) {
  return cards.slice().sort((a, b) => intrinsicValue(b, trump) - intrinsicValue(a, trump))[0];
}

// view: {hand, trump, plays:[{p,c}], seat, makerSeat, aloneSeat, seen:[], level, rng,
//        playersInTrick, voids: {seat:{suit:true}}, remaining: [seats yet to act after me]}
// seen = every card this seat has observed leaving play (tricks + upcard fate).
// voids = suits each seat has publicly shown out of (failed to follow). No hidden info.
function chooseCard(view) {
  const { hand, trump, plays, seat, level } = view;
  const rng = view.rng || Math.random;
  const led = plays.length ? effSuit(plays[0].c, trump) : null;
  const legal = legalMoves(hand, led, trump);
  if (legal.length === 1) return legal[0];
  if (level === 'easy') return legal[Math.floor(rng() * legal.length)];

  const unseen = makeDeck().filter(c => !hand.includes(c) && !(view.seen || []).includes(c)
    && !plays.some(pl => pl.c === c));
  const myTeamMade = team(view.makerSeat) === team(seat);
  const xh = level === 'xhard';
  const hard = level === 'hard' || xh;
  const voids = view.voids || {};
  const oppsToAct = (view.remaining || []).filter(q => team(q) !== team(seat));

  // Could any opponent still to act hold a card that beats this power?
  // Only uses public info: unseen cards minus suits that opponent has shown void in.
  function oppCanBeat(pow, ledCtx) {
    for (const o of oppsToAct) {
      const ov = voids[o] || {};
      for (const u of unseen) {
        if (ov[effSuit(u, trump)]) continue;
        if (cardPower(u, trump, ledCtx) > pow) return true;
      }
    }
    return false;
  }
  const bossTest = c => {
    const es = effSuit(c, trump);
    return xh ? !oppCanBeat(cardPower(c, trump, es), es) : isBoss(c, trump, unseen);
  };

  if (!plays.length) {
    // Leading a trick.
    const trumpsInHand = legal.filter(c => effSuit(c, trump) === trump);
    const offCards = legal.filter(c => effSuit(c, trump) !== trump);
    const trumpStillOut = unseen.some(c => effSuit(c, trump) === trump);
    if (myTeamMade && trumpsInHand.length) {
      const bossTrump = trumpsInHand.find(c => hard ? bossTest(c) : c[0] === 'J' && c[1] === trump);
      if (bossTrump && trumpStillOut) return bossTrump;
    }
    const bossOff = offCards.find(c => hard ? bossTest(c) : c[0] === 'A');
    if (bossOff) return bossOff;
    if (hard && !myTeamMade && offCards.length) {
      // defender: lead from shortest off suit to build a void
      const bySuit = {};
      for (const c of offCards) (bySuit[effSuit(c, trump)] = bySuit[effSuit(c, trump)] || []).push(c);
      const shortest = Object.values(bySuit).sort((a, b) => a.length - b.length)[0];
      return lowestBy(shortest, trump);
    }
    return lowestBy(legal, trump);
  }

  // Following.
  const winIdx = trickWinnerIdx(plays, trump);
  const winPlay = plays[winIdx];
  const partnerWinning = winPlay.p === partnerOf(seat);
  const winPow = cardPower(winPlay.c, trump, led);
  const winners = legal.filter(c => cardPower(c, trump, led) > winPow);
  const lastToAct = plays.length === view.playersInTrick - 1;

  if (partnerWinning) {
    const partnerSafe = xh ? (lastToAct || !oppCanBeat(winPow, led))
      : hard ? (isBoss(winPlay.c, trump, unseen) || lastToAct) : true;
    if (partnerSafe || !winners.length) return lowestBy(legal, trump);
  }
  if (winners.length) {
    const sorted = winners.slice().sort((a, b) => intrinsicValue(a, trump) - intrinsicValue(b, trump));
    if (xh && !lastToAct) {
      // prefer the cheapest winner that no remaining opponent can top
      const safe = sorted.find(c => !oppCanBeat(cardPower(c, trump, led), led));
      if (safe) return safe;
    }
    return sorted[0];
  }
  return lowestBy(legal, trump);
}

if (typeof module !== 'undefined') {
  module.exports = {
    SUITS, RANKS, SAME_COLOR, SUIT_NAME, SUIT_SYM,
    makeDeck, shuffle, team, partnerOf, effSuit, cardPower, intrinsicValue,
    legalMoves, trickWinnerIdx, scoreHand, handStrength, bestKeep,
    decideBid1, decideBid2, chooseDiscard, isBoss, chooseCard,
  };
}

        if (my !== matchToken) return;
      }
      sitOut = alone ? partnerOf(maker) : null;
      renderKitty('gone');
    }

    renderTrump(); renderSeats(); renderHand(); syncAll();
    await sleep(500);
    if (my !== matchToken) return;

    // ----- play 5 tricks -----
    let leader = (dealer + 1) % 4;
    if (leader === sitOut) leader = nextActive(leader);
    for (let t = 0; t < 5; t++) {
      clearTrick();
      const plays = [];
      curPlays = plays;
      const order = [];
      { let q = leader; for (let i = 0; i < activePlayers().length; i++) { order.push(q); q = nextActive(q); } }
      for (let i = 0; i < order.length; i++) {
        const p = order[i];
        renderSeats(p); syncAll();
        const led = plays.length ? effSuit(plays[0].c, trump) : null;
        const legal = legalMoves(hands[p], led, trump);
        let c = null;
        if (p === 0) {
          $('hint').textContent = led ? '' : 'Your lead';
          SFX.turn();
          c = await new Promise(res => { pendingCard = res; renderHand({ legal }); });
          if (my !== matchToken) return;
        } else if (isRemote(p)) {
          const a = await remotePrompt(p, 'card', { legal, lead: !led });
          if (my !== matchToken) return;
          if (a && legal.includes(a)) c = a;
        }
        if (!c && p !== 0) {
          if (!isRemote(p)) { await sleep(AI_DELAY + Math.random() * 250); }
          if (my !== matchToken) return;
          c = chooseCard({
            hand: hands[p], trump, plays, seat: p, makerSeat: maker,
            aloneSeat: alone ? maker : null, seen, level: aiLevel(p),
            playersInTrick: activePlayers().length,
            voids, remaining: order.slice(i + 1),
          });
        }
        if (led && effSuit(c, trump) !== led) voids[p][led] = true;
        hands[p] = hands[p].filter(x => x !== c);
        plays.push({ p, c });
        placeTrickCard(p, c);
        if (p === 0) renderHand(); else renderSeats(p);
        syncAll();
      }
      const wi = trickWinnerIdx(plays, trump);
      const winner = plays[wi].p;
      tricks[team(winner)]++;
      seen.push(...plays.map(pl => pl.c));
      await sleep(700);
      if (my !== matchToken) return;
      SFX.trick();
      if (mp && mp.mode === 'host') {
        for (const s in conns) {
          const seat = +s;
          const who = winner === seat ? 'You take' : (winner === 0 ? myName + ' takes' : NAMES[winner] + ' takes');
          const tv = seat % 2 === 0 ? `${tricks[0]}–${tricks[1]}` : `${tricks[1]}–${tricks[0]}`;
          try { conns[s].send({ t: 'ev', say: [`${who} the trick &nbsp;·&nbsp; ${tv}`, 1900, false] }); } catch (e) {}
        }
        say0(`${winner === 0 ? 'You take' : NAMES[winner] + ' takes'} the trick &nbsp;·&nbsp; ${tricks[0]}–${tricks[1]}`, 1900);
      } else {
        say(`${winner === 0 ? 'You take' : NAMES[winner] + ' takes'} the trick &nbsp;·&nbsp; ${tricks[0]}–${tricks[1]}`, 1900);
      }
      if (winner !== 0) {
        const nm = $('name' + winner);
        nm.classList.add('won');
        setTimeout(() => nm.classList.remove('won'), 1200);
      }
      $('trick').className = 'collect' + winner;
      if (mp && mp.mode === 'host') {
        for (const s in conns) { try { conns[s].send({ t: 'ev', collect: rotSeat(winner, +s) }); } catch (e) {} }
      }
      curPlays = [];
      renderScore(); syncAll();
      await sleep(650);
      if (my !== matchToken) return;
      leader = winner;
    }

    // ----- score the hand -----
    clearTrick();
    const res = scoreHand(team(maker), tricks, alone);
    score[res.team] += res.points;
    const us = res.team === 0;
    (us ? SFX.good : SFX.bad)();
    if (mp && mp.mode === 'host') {
      for (const s in conns) {
        const winSeat = team(+s) === res.team;
        try { conns[s].send({ t: 'ev', say: [`${res.label}<br>${winSeat ? 'MY TEAM' : 'OPPONENTS'} +${res.points}`, 2800, true] }); } catch (e) {}
      }
      say0(`${res.label}<br>${us ? 'MY TEAM' : 'OPPONENTS'} +${res.points}`, 2800, true);
    } else {
      say(`${res.label}<br>${us ? 'MY TEAM' : 'OPPONENTS'} +${res.points}`, 2800, true);
    }
    renderScore(); renderTrump(); syncAll();
    await sleep(2300);
  }

  // ---------- multiplayer core ----------
  function mpSendAll(m) { for (const s in conns) { try { conns[s].send(m); } catch (e) {} } }
  function rotSeat(q, seat) { return q == null ? null : (q - seat + 4) % 4; }
  function seatDisplayName(i) {
    if (conns[i]) return conns[i].pname || 'Guest';
    return i === 0 ? myName : NAMES[i];
  }

  function viewFor(seat) {
    const v = {
      names: [], counts: [],
      dealer: rotSeat(dealer, seat), turn: rotSeat(currentTurn, seat),
      maker: rotSeat(maker, seat), sitOut: rotSeat(sitOut, seat),
      trump: trump || null, alone: !!alone,
      score: seat % 2 === 0 ? score : [score[1], score[0]],
      tricksV: tricks ? (seat % 2 === 0 ? tricks : [tricks[1], tricks[0]]) : [0, 0],
      kitty: kittyState || null, upcard: upcard || null,
      plays: curPlays.map(pl => ({ p: rotSeat(pl.p, seat), c: pl.c })),
      myHand: hands ? hands[seat].slice() : [],
    };
    for (let i = 0; i < 4; i++) {
      v.names[rotSeat(i, seat)] = i === seat ? 'You' : seatDisplayName(i);
      v.counts[rotSeat(i, seat)] = hands ? hands[i].length : 0;
    }
    return v;
  }
  function syncAll() {
    if (!mp || mp.mode !== 'host') return;
    for (const s in conns) { try { conns[s].send({ t: 'state', v: viewFor(+s) }); } catch (e) {} }
  }

  function remotePrompt(seat, kind, data) {
    if (!conns[seat]) return Promise.resolve(null);
    return new Promise(res => {
      const reqId = ++reqCounter;
      pendingRemote[seat] = { reqId, resolve: res };
      try { conns[seat].send({ t: 'prompt', reqId, kind, data }); }
      catch (e) { delete pendingRemote[seat]; res(null); }
    });
  }

  function loadPeerJS() {
    return new Promise((res, rej) => {
      if (window.Peer) return res();
      const s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/peerjs@1.5.5/dist/peerjs.min.js';
      s.onload = res;
      s.onerror = () => rej(new Error('Could not load — check your internet connection'));
      document.head.appendChild(s);
    });
  }
  const CODE_CHARS = 'ABCDEFGHJKMNPQRSTUVWXYZ23456789';
  function genCode() {
    let c = '';
    for (let i = 0; i < 4; i++) c += CODE_CHARS[Math.floor(Math.random() * CODE_CHARS.length)];
    return c;
  }
  const peerId = code => 'euchre-jp-' + code;

  function mpStatus(t) { $('mpStatus').textContent = t; }

  async function mpHost() {
    mpStatus('Setting up table…');
    try { await loadPeerJS(); } catch (e) { mpStatus(e.message); return; }
    const codeParam = /[?&]mpcode=([a-z2-9]{4})/i.exec(location.search);
    const code = codeParam ? codeParam[1].toUpperCase() : genCode();
    peer = new Peer(peerId(code));
    peer.on('open', () => {
      mp = { mode: 'host', code };
      conns = {}; lobbyConns = [];
      showLobby();
    });
    peer.on('connection', setupHostConn);
    peer.on('error', e => {
      if (e.type === 'unavailable-id') { peer.destroy(); peer = null; mpHost(); }
      else mpStatus('Connection error: ' + e.type);
    });
  }

  function setupHostConn(conn) {
    conn.on('data', m => hostHandle(conn, m));
    conn.on('close', () => hostDrop(conn));
    conn.on('error', () => hostDrop(conn));
  }
  function seatFallbackName(seat) {
    const s = store.get();
    return (s && s.names && s.names[seat]) || DEFAULT_NAMES[seat];
  }
  function hostDrop(conn) {
    lobbyConns = lobbyConns.filter(c => c !== conn);
    const seat = conn.seat;
    if (seat != null && conns[seat] === conn) {
      delete conns[seat];
      NAMES[seat] = seatFallbackName(seat);
      applyNames();
      if (pendingRemote[seat]) { pendingRemote[seat].resolve(null); delete pendingRemote[seat]; }
      if (matchActive) say(`${conn.pname || 'A player'} lost connection — AI takes over`, 2400);
      sendLobby();
    } else sendLobby();
  }
  function hostHandle(conn, m) {
    if (!m || typeof m !== 'object') return;
    if (m.t === 'hello') {
      conn.pname = String(m.name || 'Guest').slice(0, 12);
      if (!lobbyConns.includes(conn) && conn.seat == null) lobbyConns.push(conn);
      sendLobby();
    } else if (m.t === 'sit') {
      const seat = m.seat;
      if ([1, 2, 3].includes(seat) && !conns[seat]) {
        if (conn.seat != null && conns[conn.seat] === conn) {
          delete conns[conn.seat];
          NAMES[conn.seat] = seatFallbackName(conn.seat);
        }
        conn.seat = seat; conns[seat] = conn;
        NAMES[seat] = conn.pname || 'Guest';
        applyNames();
        lobbyConns = lobbyConns.filter(c => c !== conn);
        sendLobby();
        if (matchActive) { try { conn.send({ t: 'start' }); conn.send({ t: 'state', v: viewFor(seat) }); } catch (e) {} }
      }
    } else if (m.t === 'action') {
      const seat = conn.seat;
      const pr = seat != null && pendingRemote[seat];
      if (pr && pr.reqId === m.reqId) { delete pendingRemote[seat]; pr.resolve(m.value); }
    }
  }
  function sendLobby() {
    if (!mp || mp.mode !== 'host') return;
    const seats = [0, 1, 2, 3].map(i => ({
      name: conns[i] ? conns[i].pname : (i === 0 ? myName : NAMES[i]),
      human: i === 0 || !!conns[i],
    }));
    const msg = { t: 'lobby', code: mp.code, seats };
    for (const s in conns) { try { conns[s].send(Object.assign({ yourSeat: +s }, msg)); } catch (e) {} }
    for (const c of lobbyConns) { try { c.send(Object.assign({ yourSeat: null }, msg)); } catch (e) {} }
    renderLobby(Object.assign({ yourSeat: 0 }, msg));
  }

  function renderLobby(m) {
    $('mpCodeShow').textContent = m.code;
    const SEAT_LABEL = ['Host', 'Left seat', 'Partner seat', 'Right seat'];
    const el = $('mpSeats');
    el.innerHTML = '';
    m.seats.forEach((s, i) => {
      const row = document.createElement('div');
      row.className = 'mpSeatRow';
      const who = m.yourSeat === i ? `${s.name} (you)` : s.human ? s.name : `${s.name} · AI`;
      row.innerHTML = `<span class="sl">${SEAT_LABEL[i]}</span><span class="sn">${who}</span>`;
      if (mp && mp.mode === 'client' && !s.human && i !== 0) {
        const b = document.createElement('button');
        b.className = 'abtn'; b.textContent = 'Sit';
        b.onclick = () => clientConn.send({ t: 'sit', seat: i });
        row.appendChild(b);
      }
      el.appendChild(row);
    });
    const seated = [1, 2, 3].some(i => m.seats[i].human);
    if (mp && mp.mode === 'host') {
      $('mpStartBtn').style.display = 'block';
      $('mpStartBtn').disabled = !seated;
      $('mpLobbyStatus').textContent = seated ? (matchActive ? 'Game in progress' : 'Ready when you are!') : 'Waiting for players to join…';
    } else {
      $('mpStartBtn').style.display = 'none';
      $('mpLobbyStatus').textContent = m.yourSeat == null ? 'Pick a seat' : 'Waiting for the host to start…';
    }
    if (!matchActive) $('mpLobby').classList.add('show');
  }
  function showLobby() { $('mpSetup').classList.remove('show'); sendLobby(); }

  async function mpJoin(code) {
    mpStatus('Joining…');
    try { await loadPeerJS(); } catch (e) { mpStatus(e.message); return; }
    peer = new Peer();
    peer.on('open', () => {
      clientConn = peer.connect(peerId(code), { reliable: true });
      clientConn.on('open', () => {
        mp = { mode: 'client', code };
        clientConn.send({ t: 'hello', name: myName });
        $('mpSetup').classList.remove('show');
      });
      clientConn.on('data', clientHandle);
      clientConn.on('close', () => {
        if (mp && mp.mode === 'client') { mpTeardown(); say0('Lost connection to the table', 2600, true); showMenu(); }
      });
    });
    peer.on('error', e => {
      mpStatus(e.type === 'peer-unavailable' ? 'Table "' + code + '" not found' : 'Connection error: ' + e.type);
    });
  }

  // ----- client side -----
  function clientHandle(m) {
    if (!m || typeof m !== 'object') return;
    if (m.t === 'lobby') renderLobby(m);
    else if (m.t === 'start') {
      matchToken++; matchActive = true; clientPrompt = null;
      ['menu', 'mpLobby', 'gameover', 'tourOv'].forEach(id => $(id).classList.remove('show'));
      clearTrick(); clearActions();
    } else if (m.t === 'state') clientRender(m.v);
    else if (m.t === 'ev') {
      if (m.say) say0(m.say[0], m.say[1], m.say[2]);
      if (m.sfx && SFX0[m.sfx]) SFX0[m.sfx]();
      if (m.collect != null) {
        $('trick').className = 'collect' + m.collect;
        setTimeout(() => { $('trick').className = ''; }, 800 * TSCALE);
      }
    } else if (m.t === 'prompt') clientPromptShow(m);
    else if (m.t === 'gameover') {
      matchActive = false;

      $('goTitle').textContent = m.youWin ? '🏆 You Win!' : 'They Win…';

  function clientRender(v) {
    for (const p of [1, 2, 3]) NAMES[p] = v.names[p];
    applyNames();
    trump = v.trump; maker = v.maker; alone = v.alone; sitOut = v.sitOut;
    dealer = v.dealer; score = v.score; tricks = v.tricksV; upcard = v.upcard;
    hands = [v.myHand, new Array(v.counts[1]), new Array(v.counts[2]), new Array(v.counts[3])];
    renderScore(); renderTrump(); renderSeats(v.turn); renderKitty(v.kitty);
    const cur = ['', '', '', ''];
    v.plays.forEach(pl => { cur[pl.p] = pl.c; });
    let any = false;
    for (let i = 0; i < 4; i++) {
      const slot = $('slot' + i);
      if ((slot.dataset.c || '') !== cur[i]) {
        slot.dataset.c = cur[i];
        slot.innerHTML = cur[i] ? `<img class="in${i}" src="${CARD_IMG[cur[i]]}" alt="${cur[i]}">` : '';

  function clientSendAction(reqId, value) {

  function clientPromptShow(m) {
    clientPrompt = m;

      actions([
        { label: 'Pass', cls: 'dim', value: 'pass' },
        { label: m.data.isDealer ? 'Pick It Up' : 'Order It Up', value: 'call' },
      ], `${SUIT_NAME[m.data.up[1]]} showing — your call`).then(a => {
        if (a.v === 'pass') return clientSendAction(m.reqId, { v: 'pass' });
        actions(aloneAsk, 'Play with your partner or go alone?')
          .then(b => clientSendAction(m.reqId, { v: b.v === 'alone' ? 'alone' : 'call' }));
      });
    } else if (m.kind === 'bid2') {
      const btns = SUITS.filter(s => s !== m.data.excluded).map(s => ({ label: `${suitHtml(s)} ${SUIT_NAME[s]}`, value: s }));
      if (!m.data.mustCall) btns.unshift({ label: 'Pass', cls: 'dim', value: 'pass' });
      actions(btns, m.data.mustCall ? 'You are stuck — you must call' : 'Name trump or pass').then(a => {
        if (a.v === 'pass') return clientSendAction(m.reqId, { v: 'pass' });
        actions([
          { label: 'With Partner', value: 'partner' },
          { label: 'Go Alone', cls: 'gold', value: 'alone' },
        ], 'Play with your partner or go alone?')
          .then(b => clientSendAction(m.reqId, { v: a.v, alone: b.v === 'alone' }));
      });
    } else if (m.kind === 'discard') {
      hands[0] = m.data.hand6.slice();
      say0('Pick a card to discard', 2500);

      renderHand({ legal: m.data.hand6.slice() });
    } else if (m.kind === 'card') {
      $('hint').textContent = m.data.lead ? 'Your lead' : '';
      pendingCard = c => clientSendAction(m.reqId, c);
      renderHand({ legal: m.data.legal });
    }
  }

  // ---------- tournament flow ----------
  function saveTour() { store.set(Object.assign(store.get() || {}, { tour })); }
  function roundLabel() { return ROUND_LABEL[tour.size >> tour.round] || 'Round ' + (tour.round + 1); }

  function startTournament(size) {
    const rounds = TOUR_DIFFS[size].length;
    tour = { size, round: 0, opps: shuffle(TEAM_POOL.slice()).slice(0, rounds) };
    saveTour();
    showRoundIntro();

  function showRoundIntro() {

  function beginTourMatch() {
    $('tourOv').classList.remove('show');
    inTour = true;
    const t = tour.opps[tour.round];
    NAMES[1] = t + ' A'; NAMES[3] = t + ' B';
    applyNames();
    diff = TOUR_DIFFS[tour.size][tour.round];
    playMatch(false);
  }

  function finishTourMatch(won) {
    inTour = false;
    diff = baseDiff;
    (won ? SFX.win : SFX.lose)();
    const finalScore = `${score[0]} – ${score[1]}`;
    if (won) {
      tour.round++;
      if (tour.round >= TOUR_DIFFS[tour.size].length) {
        const size = tour.size;
        const kind = TROPHY_FOR_SIZE[size];
        tour = null; saveTour(); restoreNames();
        awardTrophy(kind);
        $('tourArt').innerHTML = trophySVG(kind);
        $('tourTitle').textContent = 'Champions!';
        $('tourSub').textContent = `You won the ${size}-team tournament — ${TROPHY_META[kind].name.charAt(0) + TROPHY_META[kind].name.slice(1).toLowerCase()} Trophy earned!`;
        $('tourGo').textContent = 'Back to Menu';
        $('tourGo').onclick = () => { $('tourOv').classList.remove('show'); showMenu(); };
        $('tourMenu').style.display = 'none';
        $('tourOv').classList.add('show');
      } else {
        saveTour(); restoreNames();
        $('tourArt').innerHTML = '';
        $('tourTitle').textContent = 'You Advance!';
        $('tourSub').textContent = `Won ${finalScore} — next up: ${tour.opps[tour.round]}`;
        $('tourGo').textContent = 'Next Match';
        $('tourGo').onclick = () => { $('tourOv').classList.remove('show'); showRoundIntro(); };
        $('tourMenu').style.display = 'block';
        $('tourOv').classList.add('show');
      }
    } else {
      const label = roundLabel(), size = tour.size;
      tour = null; saveTour(); restoreNames();
      $('tourArt').innerHTML = '';
      $('tourTitle').textContent = 'Knocked Out';
      $('tourSub').textContent = `Lost the ${label} ${finalScore}`;
      $('tourGo').textContent = 'New Tournament';
      $('tourGo').onclick = () => { $('tourOv').classList.remove('show'); startTournament(size); };
      $('tourMenu').style.display = 'block';
      $('tourOv').classList.add('show');
    }
  }

  $('tourMenu').onclick = () => { $('tourOv').classList.remove('show'); showMenu(); };
  $('tourStartBtn').onclick = () => {
    readNameInputs();
    store.set(Object.assign(store.get() || {}, { names: NAMES.slice() }));
    $('menu').classList.remove('show');
    $('tourSetup').classList.add('show');
  };
  $('tourBack').onclick = () => { $('tourSetup').classList.remove('show'); showMenu(); };
  document.querySelectorAll('#sizeRow .obtn').forEach(b => b.onclick = () => {
    $('tourSetup').classList.remove('show');
    startTournament(+b.dataset.size);
  });

  // ---------- menu wiring ----------
  function setDiff(d) {
    diff = d; baseDiff = d;
    document.querySelectorAll('.dbtn').forEach(b => b.classList.toggle('sel', b.dataset.d === d));
  }
  document.querySelectorAll('.dbtn').forEach(b => b.onclick = () => { setDiff(b.dataset.d); store.set(Object.assign(store.get() || {}, { diff })); });

  $('startBtn').onclick = () => {
    readNameInputs();
    store.set(Object.assign(store.get() || {}, { names: NAMES.slice() }));
    $('menu').classList.remove('show');
    playMatch(false);
  };
  $('contBtn').onclick = () => {
    readNameInputs();
    const s = store.get();
    store.set(Object.assign(store.get() || {}, { names: NAMES.slice() }));
    $('menu').classList.remove('show');
    if (s && s.tour) { tour = s.tour; showRoundIntro(); return; }
    if (s && s.inMatch) { score = s.score; dealer = s.dealer; }
    playMatch(true);
  };
  $('againBtn').onclick = () => {
    $('gameover').classList.remove('show');
    if (mp && mp.mode === 'host') { mpSendAll({ t: 'start' }); matchActive = true; }
    playMatch(false);
  };
  $('goMenuBtn').onclick = () => {
    $('gameover').classList.remove('show');
    if (mp) { if (mp.mode === 'host') mpSendAll({ t: 'ev', say: ['Host closed the table', 2600, true] }); mpTeardown(); }
    showMenu();
  };
  $('menuBtn').onclick = () => $('confirm').classList.add('show');
  $('sndBtn').onclick = () => setMuted(!muted);
  $('confirmNo').onclick = () => $('confirm').classList.remove('show');
  $('confirmYes').onclick = () => {
    matchToken++;
    pendingCard = null; pendingAction = null;
    if (inTour) { inTour = false; diff = baseDiff; restoreNames(); }
    if (mp) { if (mp.mode === 'host') mpSendAll({ t: 'ev', say: ['Host closed the table', 2600, true] }); mpTeardown(); }
    $('confirm').classList.remove('show');
    showMenu();
  };

  function showMenu() {
    const s = store.get();
    const hasTour = s && s.tour;
    $('contBtn').style.display = (hasTour || (s && s.inMatch)) ? 'block' : 'none';
    $('contBtn').textContent = hasTour ? 'Continue Tournament' : 'Continue Match';
    $('menu').classList.add('show');
  }

  // menu art
  $('menuCards').innerHTML =
    `<img src="${CARD_IMG.JS}"><img src="${CARD_IMG.BACK}"><img src="${CARD_IMG.JC}">`;

  const saved = store.get();
  if (saved && saved.diff) setDiff(saved.diff);
  if (saved && saved.muted) setMuted(true);
  if (saved && saved.names) {
    for (const p of [1, 2, 3]) {
      NAMES[p] = saved.names[p] || DEFAULT_NAMES[p];
      if (NAMES[p] !== DEFAULT_NAMES[p]) $('nm' + p).value = NAMES[p];
    }
  }
  applyNames();
  updateTrophyBtn();
  showMenu();
})();
</script>
</body>
</html>
